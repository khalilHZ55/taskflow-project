<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskflow Project</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header">
    <h1>Taskflow</h1>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h2>Filtros</h2>
      <ul>
        <li>Todas</li>
        <li>Alta prioridad</li>
        <li>Completadas</li>
      </ul>
    </aside>

    <main class="main">
      <section class="tasks">
        <h2>Mis tareas</h2>

        <article class="task-card">
          <span class="task-title">Diseñar wireframes</span>
          <span class="task-category">UX</span>
          <span class="badge high">Alta</span>
        </article>

        <article class="task-card">
          <span class="task-title">Implementar login</span>
          <span class="task-category">Frontend</span>
          <span class="badge medium">Media</span>
        </article>

        <article class="task-card">
          <span class="task-title">Deploy en producción</span>
          <span class="task-category">DevOps</span>
          <span class="badge low">Baja</span>
        </article>

      </section>
    </main>
  </div>
</body>
</html>
