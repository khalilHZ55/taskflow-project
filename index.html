<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskflow Project</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header">
    <h1>Taskflow</h1>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h2>Filtros</h2>
      <ul>
        <li>Todas</li>
        <li>Alta prioridad</li>
        <li>Completadas</li>
      </ul>
    </aside>

    <main class="main">
      <section class="tasks">
  <h2>Mis tareas</h2>

  <!-- formulario -->
  <form id="task-form">
    <input
      type="text"
      id="task-input"
      placeholder="Nueva tarea..."
      required
    />
    <button type="submit">Añadir</button>
  </form>

  <!-- buscador  -->
  <input
    type="text"
    id="search-input"
    placeholder="Buscar tareas..."
  />

  <!-- contenedor de tareas -->
  <div id="task-list"></div>
</section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
